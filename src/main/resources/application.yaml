spring:
  application:
    name: qureka

  # ── JPA 공통 설정 ─────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update       # 운영 배포 후 validate 로 변경 권장
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── JSON ─────────────────────────────────────────────────
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ss

  # ── 파일 업로드 ───────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  # ── Spring AI 공통 옵션 ───────────────────────────────────
  # api-key는 application-local.yml 에서 설정
  ai:
    openai:
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 8000

# ── 서버 ──────────────────────────────────────────────────
server:
  port: 8080
  forward-headers-strategy: framework  # Render 등 리버스 프록시 사용 시 필요

# ── JWT 만료 시간 ──────────────────────────────────
jwt:
  access-token-expires-in: 3600000     # 1시간 (ms)
  refresh-token-expires-in: 604800000  # 7일   (ms)

# ── CORS 기본값 ───────────────────────────────────────────
cors:
  allowed-origins: http://localhost:5173
  allow-all-origins: false             # 운영 환경에서 true 금지

# ── 로깅 (공통 — 파일 설정) ───────────────────────────────
logging:
  level:
    root: INFO
    com.qureka: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/qureka.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

# ── Actuator 헬스체크 ─────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized